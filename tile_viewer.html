<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Date Palm Tiles Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@2.5.0/dist/maplibre-gl.css"
  />
  <style>
    html, body { margin: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255, 255, 255, 0.92);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: sans-serif;
      z-index: 1;
      box-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }
    #controls button { margin-left: 6px; }
  </style>
</head>
<body>
  <div id="controls">
    <label for="province">Province:</label>
    <select id="province">
      <option>Al_Quassim</option>
      <option>Al_Bahah</option>
      <option>Al_Jawf</option>
      <option>Al_Madinah</option>
      <option>Ar_Riyad</option>
      <option>Asir</option>
      <option>Eastern_Province</option>
      <option>Hail</option>
      <option>Jizan</option>
      <option>Makkah</option>
      <option>Najran</option>
      <option>Northern_Borders</option>
      <option>Tabuk</option>
    </select>
    <button id="reload">Refresh tiles</button>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/maplibre-gl@2.5.0/dist/maplibre-gl.js"></script>
  <script>
    const tileEndpoint = "http://127.0.0.1:8766/datepalms_tiles";
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          osm: {
            type: "raster",
            tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
            tileSize: 256,
          },
        },
        layers: [{ id: "osm", type: "raster", source: "osm" }],
      },
      center: [43.5, 26.3],
      zoom: 10,
    });

    function refreshLayer() {
      const province = document.getElementById("province").value;
      if (map.getLayer("datepalms-layer")) {
        map.removeLayer("datepalms-layer");
      }
      if (map.getSource("datepalms")) {
        map.removeSource("datepalms");
      }
      map.addSource("datepalms", {
        type: "vector",
        tiles: [`${tileEndpoint}/${province}/{z}/{x}/{y}.pbf`],
        minzoom: 5,
        maxzoom: 16,
      });
      map.addLayer({
        id: "datepalms-layer",
        type: "fill",
        source: "datepalms",
        "source-layer": `${province}_MERGED_OVERLAP`,
        paint: {
          "fill-color": "#84ff11",
          "fill-outline-color": "#5ea700",
          "fill-opacity": 0.65,
        },
      });
    }

    map.on("load", () => {
      refreshLayer();
      document.getElementById("reload").addEventListener("click", refreshLayer);
    });
  </script>
</body>
</html>
